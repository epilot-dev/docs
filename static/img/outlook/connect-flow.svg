<svg xmlns="http://www.w3.org/2000/svg" width="720" height="520" viewBox="0 0 720 520" role="img" aria-labelledby="title desc">
  <title id="title">Outlook connect flow</title>
  <desc id="desc">Five-step sequence: epilot admin starts the connection, tenant admin grants one-time consent, service account signs in and authorises scopes, epilot stores encrypted tokens, then the epilot admin selects shared mailboxes and live sync begins.</desc>
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0064FF"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#6B7280"/>
    </marker>
    <style>
      .bg{fill:#fff}
      .laneBlue{fill:#EFF6FF;stroke:#0064FF;stroke-width:2}
      .laneGray{fill:#F3F4F6;stroke:#6B7280;stroke-width:2}
      .life{stroke:#D1D5DB;stroke-width:2;stroke-dasharray:6 7}
      .card{fill:#fff;stroke:#D1D5DB;stroke-width:1.3}
      .cardBlue{fill:#F0F7FF;stroke:#38BDF8;stroke-width:1.5}
      .blueArrow{stroke:#0064FF;stroke-width:2.4;fill:none;marker-end:url(#arrowBlue)}
      .grayArrow{stroke:#6B7280;stroke-width:2.4;fill:none;marker-end:url(#arrowGray)}
      .h{font:600 16px system-ui,-apple-system,Segoe UI,sans-serif;fill:#111827}
      .t{font:14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#374151}
      .s{font:600 14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#111827}
      .n{font:700 14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#0064FF}
      .ng{font:700 14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#6B7280}
    </style>
  </defs>

  <rect class="bg" width="720" height="520"/>

  <rect class="laneBlue" x="42" y="36" width="180" height="58" rx="8"/>
  <text class="h" x="80" y="70">epilot admin</text>

  <rect class="laneGray" x="270" y="36" width="180" height="58" rx="8"/>
  <text class="h" x="292" y="61">Microsoft 365</text>
  <text class="h" x="315" y="81">tenant admin</text>

  <rect class="laneGray" x="498" y="36" width="180" height="58" rx="8"/>
  <text class="h" x="535" y="70">service account</text>

  <line class="life" x1="132" y1="94" x2="132" y2="486"/>
  <line class="life" x1="360" y1="94" x2="360" y2="486"/>
  <line class="life" x1="588" y1="94" x2="588" y2="486"/>

  <rect class="cardBlue" x="68" y="118" width="170" height="58" rx="8"/>
  <text class="n" x="88" y="143">1</text>
  <text class="s" x="112" y="143">Clicks Connect</text>
  <text class="t" x="112" y="163">in epilot</text>
  <path class="blueArrow" d="M132 176 V196"/>

  <path class="grayArrow" d="M132 212 H360"/>
  <rect class="card" x="178" y="224" width="246" height="58" rx="8"/>
  <text class="ng" x="198" y="249">2</text>
  <text class="s" x="222" y="249">Grants admin consent</text>
  <text class="t" x="222" y="269">one-time, tenant-wide</text>

  <rect class="card" x="496" y="302" width="184" height="58" rx="8"/>
  <text class="ng" x="516" y="327">3</text>
  <text class="s" x="540" y="327">Signs in</text>
  <text class="t" x="540" y="347">authorises scopes</text>
  <path class="grayArrow" d="M588 282 V302"/>

  <path class="blueArrow" d="M588 386 H132"/>
  <rect class="cardBlue" x="220" y="358" width="280" height="58" rx="8"/>
  <text class="n" x="240" y="383">4</text>
  <text class="s" x="264" y="383">epilot stores OAuth tokens</text>
  <text class="t" x="264" y="403">encrypted, in eu-central-1</text>

  <path class="blueArrow" d="M132 470 H588"/>
  <rect class="cardBlue" x="142" y="430" width="420" height="58" rx="8"/>
  <text class="n" x="162" y="455">5</text>
  <text class="s" x="186" y="455">Picks shared mailboxes</text>
  <text class="t" x="186" y="475">Graph subscriptions created, backfill starts</text>
</svg>
